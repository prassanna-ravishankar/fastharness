name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Core (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run pytest
      - run: uv run ty check src/ --exclude 'src/fastharness/runtime/openhands.py' --exclude 'src/fastharness/runtime/deepagents.py' --exclude 'src/fastharness/runtime/openclaw.py' --exclude 'src/fastharness/bridges/openclaw.py'
      - run: uv run ruff check src/

  test-full:
    name: Full (all backends)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev --extra openhands --extra deepagents --extra openclaw --extra redis
      - run: uv run pytest
      - run: uv run ty check src/
      - run: uv run ruff check src/
